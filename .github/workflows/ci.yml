name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      # The Cargo.toml uses relative path dependencies that resolve to
      # ../../codetracer-trace-format/ from the repo root. Clone it as
      # a sibling directory so cargo can resolve these paths.
      - name: Resolve dependency refs
        id: resolve-ref
        run: |
          # Try plain-text sibling-pins first, fall back to JSON
          SIBLING_PINS=".github/sibling-pins"
          SIBLING_PINS_JSON=".github/sibling-pins.json"

          # Resolve trace-format ref
          if [ -f "${SIBLING_PINS}" ]; then
            TF_REF="$(grep '^codetracer-trace-format ' "${SIBLING_PINS}" | cut -d' ' -f2)" || true
          elif [ -f "${SIBLING_PINS_JSON}" ]; then
            TF_REF="$(python3 -c "import json,sys; d=json.load(open('${SIBLING_PINS_JSON}')); print(d.get('codetracer-trace-format',''))" 2>/dev/null)" || true
          fi
          echo "trace_format_ref=${TF_REF:-main}" >> "$GITHUB_OUTPUT"
          echo "Resolved trace-format ref: ${TF_REF:-main}"

      - name: Clone codetracer-trace-format (path dependency)
        run: |
          TF_REF="${{ steps.resolve-ref.outputs.trace_format_ref }}"
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [ -n "${TOKEN}" ]; then
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer-trace-format.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer-trace-format.git"
          fi

          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
          if ! git clone --depth 1 --branch "${TF_REF}" --single-branch \
            "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format" 2>/dev/null; then
            rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git -C "${GITHUB_WORKSPACE}/../codetracer-trace-format" checkout "${TF_REF}"
          fi

          echo "codetracer-trace-format cloned at: $(realpath "${GITHUB_WORKSPACE}/../codetracer-trace-format")"

      - name: Install zstd headers
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev

      - name: Build Nim trace writer library
        run: |
          git clone --depth 1 \
            "https://github.com/metacraft-labs/codetracer-trace-format-nim.git" \
            "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
          nix develop --command bash -c "
            cd '${GITHUB_WORKSPACE}/../codetracer-trace-format-nim'
            nimble install -y stew results
            nim c --app:staticlib --mm:arc --noMain -d:release --passC:'-fPIC' -p:src \
              -o:libcodetracer_trace_writer.a src/codetracer_trace_writer_ffi.nim
          "
          echo "CODETRACER_NIM_LIB_DIR=${GITHUB_WORKSPACE}/../codetracer-trace-format-nim" >> "$GITHUB_ENV"

      - name: Build
        run: nix develop --impure --command just build

      - name: Test
        run: nix develop --impure --command just test

      - name: Lint
        run: nix develop --impure --command just lint

  nix-build:
    name: Verify nix flake packages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build default package
        run: nix build .#default
