name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, nixos]
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - uses: actions/checkout@v4

      - name: Setup dev env
        # setup-dev-env installs nix and clones the siblings listed in
        # .github/sibling-repos (codetracer-trace-format,
        # codetracer-trace-format-nim) adjacent to this checkout at the
        # workspace-lock-pinned revisions. The Rust trace writer's
        # Cargo.toml path deps resolve to ../codetracer-trace-format/...
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Build Nim trace writer library (sibling artifact)
        # The Nim FFI trace-writer static lib is built from the
        # workflow-cloned ../codetracer-trace-format-nim sibling inside
        # THIS repo's dev shell (which provides nim/nimble/zstd headers).
        run: |
          dev-exec bash -c '
            set -euo pipefail
            cd "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            nimble install -y stew results
            nim c --app:staticlib --mm:arc --noMain -d:release --passC:"-fPIC" -p:src \
              -o:libcodetracer_trace_writer.a src/codetracer_trace_writer_ffi.nim
          '
          echo "CODETRACER_NIM_LIB_DIR=${GITHUB_WORKSPACE}/../codetracer-trace-format-nim" >> "$GITHUB_ENV"

      - name: Build
        run: dev-exec just build

      - name: Test
        run: dev-exec just test

      - name: Lint
        run: dev-exec just lint

  nix-build:
    name: Verify nix flake packages build
    runs-on: [self-hosted, nixos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build default package
        run: nix build .#default
