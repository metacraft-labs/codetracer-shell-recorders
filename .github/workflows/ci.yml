name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      # The Cargo.toml uses relative path dependencies to the sibling
      # codetracer repo (../../codetracer/libs/codetracer-trace-format/).
      # Clone it so cargo can resolve these.
      - name: Resolve dependency refs
        id: resolve-ref
        run: |
          SIBLING_PINS=".github/sibling-pins"

          # Resolve codetracer ref
          if [ -f "${SIBLING_PINS}" ]; then
            CT_REF="$(grep '^codetracer ' "${SIBLING_PINS}" | cut -d' ' -f2)" || true
          fi
          echo "codetracer_ref=${CT_REF:-main}" >> "$GITHUB_OUTPUT"
          echo "Resolved codetracer ref: ${CT_REF:-main}"

          # Resolve trace-format ref (for submodule override)
          if [ -f "${SIBLING_PINS}" ]; then
            TF_REF="$(grep '^codetracer-trace-format ' "${SIBLING_PINS}" | cut -d' ' -f2)" || true
          fi
          echo "trace_format_ref=${TF_REF:-}" >> "$GITHUB_OUTPUT"
          echo "Resolved trace-format ref: ${TF_REF:-<default>}"

      - name: Clone codetracer (for path dependencies)
        run: |
          REF="${{ steps.resolve-ref.outputs.codetracer_ref }}"
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [ -n "${TOKEN}" ]; then
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer.git"
          fi

          # Only need the trace-format libs (not submodules) for building
          if ! git clone --depth 1 --branch "${REF}" --single-branch \
            "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer" 2>/dev/null; then
            rm -rf "${GITHUB_WORKSPACE}/../codetracer"
            git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer"
            git -C "${GITHUB_WORKSPACE}/../codetracer" checkout "${REF}"
          fi

          # Only init the trace-format submodule (capnproto schema), skip others
          # to avoid needing auth tokens for private submodules like tree-sitter-nim
          cd "${GITHUB_WORKSPACE}/../codetracer"
          git submodule init libs/codetracer-trace-format 2>/dev/null || true
          git submodule update --depth 1 libs/codetracer-trace-format 2>/dev/null || true

          # Override trace-format to a specific ref if pinned
          TF_REF="${{ steps.resolve-ref.outputs.trace_format_ref }}"
          if [ -n "${TF_REF}" ]; then
            echo "Overriding trace-format submodule to ${TF_REF}"
            git -C libs/codetracer-trace-format fetch origin "${TF_REF}" 2>/dev/null || \
              git -C libs/codetracer-trace-format fetch --unshallow origin 2>/dev/null || true
            git -C libs/codetracer-trace-format checkout "${TF_REF}" 2>/dev/null || \
              echo "WARN: could not checkout trace-format at ${TF_REF}, using default"
          fi

          echo "Codetracer cloned at: $(realpath "${GITHUB_WORKSPACE}/../codetracer")"

      - name: Build
        run: nix develop --command just build

      - name: Test
        run: nix develop --command just test

      - name: Lint
        run: nix develop --command just lint

  nix-build:
    name: Verify nix flake packages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build default package
        run: nix build .#default
