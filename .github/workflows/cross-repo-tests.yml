# Cross-Repo Integration Tests
#
# PURPOSE:
# Builds ct-shell-trace-writer from this repository and runs integration tests
# defined in the sibling codetracer repo (metacraft-labs/codetracer). This
# validates that changes to the shell recorders do not break the CodeTracer
# db-backend flow tests (bash_flow_integration, zsh_flow_integration).
#
# WORKSPACE LAYOUT:
# The cross-repo test script expects both repositories side-by-side:
#
#   $GITHUB_WORKSPACE/../
#     codetracer/                        <-- cloned by this workflow
#     codetracer-shell-recorders/        <-- checked out by actions/checkout
#
# POLICY: All CI steps should be reproducible locally via `just` targets.
# Local equivalent:
#   just cross-test
#
# Codetracer revision pinning:
#   Priority cascade for resolving the codetracer ref:
#     1. workflow_dispatch input `codetracer_ref` (manual override)
#     2. repository_dispatch `client_payload.codetracer_ref` (bidirectional)
#     3. repo-workspaces workspace lock (via setup-dev-env, pinned SHA)

name: Cross-Repo Integration Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

  workflow_dispatch:
    inputs:
      codetracer_ref:
        description: 'Git ref (branch/tag/SHA) of the codetracer repo to test against'
        required: false
        default: 'main'

  # Bidirectional trigger: the codetracer repo can dispatch this event when
  # shell-recorder-related files change (e.g. db-backend Bash/Zsh support).
  #
  # Expected payload:
  #   {
  #     "event_type": "cross-repo-test",
  #     "client_payload": {
  #       "codetracer_ref": "<git-ref-or-sha>",
  #       "triggered_by": "codetracer PR #123"
  #     }
  #   }
  repository_dispatch:
    types: [cross-repo-test]

jobs:
  cross-repo-tests:
    runs-on: [self-hosted, nixos]
    # Cross-repo tests need access to private submodules (tree-sitter-nim)
    # in the codetracer repo, which requires the CI_TOKEN_PROVIDER_APP_ID
    # secret. Skip gracefully on forks or when the secret is not configured.
    if: ${{ github.event_name == 'repository_dispatch' || github.repository == 'metacraft-labs/codetracer-shell-recorders' }}

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      # 1. Checkout this repository (codetracer-shell-recorders)
      - name: Checkout codetracer-shell-recorders
        uses: actions/checkout@v4

      # 2. Set up the dev env and clone sibling repositories.
      #
      # setup-dev-env installs nix and clones the cross-repo siblings
      # adjacent to this checkout at workspace-lock-pinned revisions:
      #   - codetracer (with submodules; provides the db-backend flow
      #     tests and the tree-sitter-nim submodule)
      #   - codetracer-trace-format (the recorder's Cargo.toml path deps
      #     resolve to ../codetracer-trace-format/...)
      # The workflow_dispatch input defaults to 'main', which the original
      # resolver treated as "no override"; preserve that by only passing
      # the input when it is set to something other than 'main'. The
      # repository_dispatch payload (empty unless set) also overrides;
      # empty => lock.
      - name: Setup dev env
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}
          substituters: ${{ vars.SUBSTITUTERS }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-cache: ${{ vars.ATTIC_CACHE }}
          attic-endpoint: ${{ vars.ATTIC_ENDPOINT }}
          siblings: |
            codetracer=${{ (github.event.inputs.codetracer_ref != 'main' && github.event.inputs.codetracer_ref) || github.event.client_payload.codetracer_ref }}
            codetracer-trace-format

      # Override the codetracer/libs/codetracer-trace-format submodule with
      # the workflow-cloned sibling (already at the lock-pinned revision)
      # so the recorder and the db-backend it links against advance
      # together. Copy from the adjacent clone rather than re-resolving.
      - name: Override trace-format submodule in codetracer/libs
        run: |
          SRC="${GITHUB_WORKSPACE}/../codetracer-trace-format"
          DEST="${GITHUB_WORKSPACE}/../codetracer/libs/codetracer-trace-format"
          rm -rf "$DEST"
          cp -a "$SRC" "$DEST"

      # 5. Generate tree-sitter-nim parser (gitignored generated file)
      #
      # We provision tree-sitter-cli via `nix shell nixpkgs#tree-sitter`
      # because the self-hosted nixos runners don't have npm on PATH (the
      # previous `npm install -g tree-sitter-cli` step relied on the
      # ubuntu-latest runner image's Node toolchain).  Using nix here keeps
      # the step hermetic and matches the rest of the workflow.
      - name: Generate tree-sitter-nim parser
        run: |
          cd "${GITHUB_WORKSPACE}/../codetracer/libs/tree-sitter-nim"
          nix shell nixpkgs#tree-sitter --command tree-sitter generate
          ls -la src/parser.c

      # 6. Run cross-repo integration tests
      - name: Run cross-repo integration tests
        run: dev-exec bash scripts/run-cross-repo-tests.sh all

      # 7. Upload test logs on failure
      - name: Upload cross-repo test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-test-logs
          path: target/cross-test-logs/
          retention-days: 14
          if-no-files-found: ignore
