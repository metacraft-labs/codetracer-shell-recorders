# Cross-Repo Integration Tests
#
# PURPOSE:
# Builds ct-shell-trace-writer from this repository and runs integration tests
# defined in the sibling codetracer repo (metacraft-labs/codetracer). This
# validates that changes to the shell recorders do not break the CodeTracer
# db-backend flow tests (bash_flow_integration, zsh_flow_integration).
#
# WORKSPACE LAYOUT:
# The cross-repo test script expects both repositories side-by-side:
#
#   $GITHUB_WORKSPACE/../
#     codetracer/                        <-- cloned by this workflow
#     codetracer-shell-recorders/        <-- checked out by actions/checkout
#
# POLICY: All CI steps should be reproducible locally via `just` targets.
# Local equivalent:
#   just cross-test
#
# Codetracer revision pinning:
#   Priority cascade for resolving the codetracer ref:
#     1. workflow_dispatch input `codetracer_ref` (manual override)
#     2. repository_dispatch `client_payload.codetracer_ref` (bidirectional)
#     3. repo-workspaces workspace lock (scripts/resolve-sibling-rev.sh,
#        pinned SHA)

name: Cross-Repo Integration Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

  workflow_dispatch:
    inputs:
      codetracer_ref:
        description: 'Git ref (branch/tag/SHA) of the codetracer repo to test against'
        required: false
        default: 'main'

  # Bidirectional trigger: the codetracer repo can dispatch this event when
  # shell-recorder-related files change (e.g. db-backend Bash/Zsh support).
  #
  # Expected payload:
  #   {
  #     "event_type": "cross-repo-test",
  #     "client_payload": {
  #       "codetracer_ref": "<git-ref-or-sha>",
  #       "triggered_by": "codetracer PR #123"
  #     }
  #   }
  repository_dispatch:
    types: [cross-repo-test]

jobs:
  cross-repo-tests:
    runs-on: [self-hosted, nixos]
    # Cross-repo tests need access to private submodules (tree-sitter-nim)
    # in the codetracer repo, which requires the CI_TOKEN_PROVIDER_APP_ID
    # secret. Skip gracefully on forks or when the secret is not configured.
    if: ${{ github.event_name == 'repository_dispatch' || github.repository == 'metacraft-labs/codetracer-shell-recorders' }}

    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      # 1. Checkout this repository (codetracer-shell-recorders)
      - name: Checkout codetracer-shell-recorders
        uses: actions/checkout@v4

      # 2. Set up Nix
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout metacraft-manifests (workspace locks)
        uses: actions/checkout@v5
        with:
          repository: metacraft-labs/metacraft-manifests
          ref: latest
          path: _manifests
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve cross-repo workspace-lock SHA
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            pull_request) CANDS="${{ github.event.pull_request.base.sha }}" ;;
            push) CANDS="${{ github.sha }} ${{ github.event.before }}" ;;
            *) CANDS="${{ github.sha }}" ;;
          esac
          LOCK_SHA=""
          for c in $CANDS; do
            [ -z "$c" ] && continue
            [ "$c" = "0000000000000000000000000000000000000000" ] && continue
            if "${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
                 --repo codetracer-shell-recorders --sibling codetracer \
                 --manifest-dir "${{ github.workspace }}/_manifests" \
                 --sha "$c" --no-walk >/dev/null 2>&1; then
              LOCK_SHA="$c"; break
            fi
          done
          if [ -z "$LOCK_SHA" ]; then
            echo "::error::No repo-workspaces workspace lock for codetracer-shell-recorders (candidates: $CANDS). The commit must be published through the workspace tooling (pre-push hook / 'workspace lock')."
            exit 1
          fi
          echo "CT_MANIFEST_DIR=${{ github.workspace }}/_manifests" >> "$GITHUB_ENV"
          echo "CT_LOCK_SHA=$LOCK_SHA" >> "$GITHUB_ENV"
          echo "Resolved cross-repo lock SHA for codetracer-shell-recorders: $LOCK_SHA"

      # 3. Resolve sibling refs via priority cascade:
      #    1. workflow_dispatch input (manual override)
      #    2. repository_dispatch payload (bidirectional trigger)
      #    3. repo-workspaces workspace lock (resolver, pinned SHA)
      - name: Resolve codetracer ref
        id: resolve-ref
        shell: bash
        run: |
          # 1. workflow_dispatch input (manual trigger)
          DISPATCH_REF="${{ github.event.inputs.codetracer_ref }}"
          if [ -n "${DISPATCH_REF}" ] && [ "${DISPATCH_REF}" != "main" ]; then
            CT_REF="${DISPATCH_REF}"
            echo "Resolved codetracer ref from workflow_dispatch: ${CT_REF}"
          # 2. repository_dispatch payload (bidirectional trigger)
          elif [ -n "${{ github.event.client_payload.codetracer_ref }}" ]; then
            CT_REF="${{ github.event.client_payload.codetracer_ref }}"
            echo "Resolved codetracer ref from repository_dispatch: ${CT_REF}"
          # 3. repo-workspaces workspace lock (resolver, pinned SHA)
          else
            CT_REF="$("${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
              --repo codetracer-shell-recorders --sibling codetracer \
              --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
            echo "Resolved codetracer ref from workspace lock: ${CT_REF}"
          fi
          echo "codetracer_ref=${CT_REF}" >> "$GITHUB_OUTPUT"

          # Resolve trace-format ref (for submodule override) from the lock.
          TF_REF="$("${{ github.workspace }}/scripts/resolve-sibling-rev.sh" \
            --repo codetracer-shell-recorders --sibling codetracer-trace-format \
            --manifest-dir "$CT_MANIFEST_DIR" --sha "$CT_LOCK_SHA" --no-walk)"
          echo "trace_format_ref=${TF_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved trace-format ref: ${TF_REF}"

      # 4. Clone the codetracer repo as a sibling directory
      - name: Clone codetracer repo
        env:
          CODETRACER_REF: ${{ steps.resolve-ref.outputs.codetracer_ref }}
        run: |
          echo "Cloning codetracer at ref: ${CODETRACER_REF}"

          # Clean up from previous runs (self-hosted runners may retain state)
          rm -rf "${GITHUB_WORKSPACE}/../codetracer"

          # Configure git URL rewriting for private submodules
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -n "${TOKEN}" ]; then
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
            git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer.git"
          fi

          # Clone into parent directory for sibling layout
          if ! git clone \
            --depth 1 \
            --branch "${CODETRACER_REF}" \
            --single-branch \
            "${CLONE_URL}" \
            "${GITHUB_WORKSPACE}/../codetracer" 2>/dev/null; then
            echo "Shallow branch clone failed (ref may be a SHA); falling back"
            rm -rf "${GITHUB_WORKSPACE}/../codetracer"
            git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer"
            git -C "${GITHUB_WORKSPACE}/../codetracer" checkout "${CODETRACER_REF}"
          fi

          # Initialize and update submodules (requires CI_TOKEN_PROVIDER_APP_ID
          # for private submodules like tree-sitter-nim)
          cd "${GITHUB_WORKSPACE}/../codetracer"
          git submodule init
          if [ -z "${TOKEN}" ]; then
            echo "::error::CI_TOKEN_PROVIDER_APP_ID secret is required for cross-repo tests."
            echo "::error::The codetracer repo has private submodules that need auth."
            echo "::error::Add the secret in Settings > Secrets and variables > Actions."
            exit 1
          fi
          for url in $(git config --get-regexp '^submodule\..*\.url$' | grep -E 'git@github\.com:|https://github\.com/' | cut -d' ' -f1); do
            old_url=$(git config --get "$url")
            new_url=$(echo "$old_url" \
              | sed "s|git@github.com:|https://x-access-token:${TOKEN}@github.com/|" \
              | sed "s|https://github.com/|https://x-access-token:${TOKEN}@github.com/|")
            git config "$url" "$new_url"
          done
          git submodule update --recursive --depth 1

          # Override trace-format submodule to a specific ref if pinned
          TF_REF="${{ steps.resolve-ref.outputs.trace_format_ref }}"
          if [ -n "${TF_REF}" ]; then
            echo "Overriding trace-format submodule to ${TF_REF}"
            git -C libs/codetracer-trace-format fetch origin "${TF_REF}" 2>/dev/null || \
              git -C libs/codetracer-trace-format fetch --unshallow origin 2>/dev/null || true
            git -C libs/codetracer-trace-format checkout "${TF_REF}" 2>/dev/null || \
              echo "WARN: could not checkout trace-format at ${TF_REF}, using default"
          fi

          echo "Codetracer cloned to: $(realpath "${GITHUB_WORKSPACE}/../codetracer")"
          echo "HEAD: $(git -C "${GITHUB_WORKSPACE}/../codetracer" rev-parse HEAD)"

      # 4b. Clone codetracer-trace-format as a direct sibling (Cargo.toml path deps)
      - name: Clone codetracer-trace-format (path dependency)
        run: |
          TF_REF="${{ steps.resolve-ref.outputs.trace_format_ref }}"
          TOKEN="${{ steps.app-token.outputs.token }}"
          if [ -n "${TOKEN}" ]; then
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer-trace-format.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer-trace-format.git"
          fi

          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
          if [ -n "${TF_REF}" ]; then
            if ! git clone --depth 1 --branch "${TF_REF}" --single-branch \
              "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format" 2>/dev/null; then
              rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
              git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format"
              git -C "${GITHUB_WORKSPACE}/../codetracer-trace-format" checkout "${TF_REF}"
            fi
          else
            git clone --depth 1 "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format"
          fi

      # 5. Generate tree-sitter-nim parser (gitignored generated file)
      #
      # We provision tree-sitter-cli via `nix shell nixpkgs#tree-sitter`
      # because the self-hosted nixos runners don't have npm on PATH (the
      # previous `npm install -g tree-sitter-cli` step relied on the
      # ubuntu-latest runner image's Node toolchain).  Using nix here keeps
      # the step hermetic and matches the rest of the workflow.
      - name: Generate tree-sitter-nim parser
        run: |
          cd "${GITHUB_WORKSPACE}/../codetracer/libs/tree-sitter-nim"
          nix shell nixpkgs#tree-sitter --command tree-sitter generate
          ls -la src/parser.c

      # 6. Run cross-repo integration tests
      - name: Run cross-repo integration tests
        run: nix develop --command bash scripts/run-cross-repo-tests.sh all

      # 7. Upload test logs on failure
      - name: Upload cross-repo test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-test-logs
          path: target/cross-test-logs/
          retention-days: 14
          if-no-files-found: ignore
